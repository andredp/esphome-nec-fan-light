name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: cppcheck --language=c++ --enable=warning,performance,portability --error-exitcode=1 --std=c++17 --suppress=missingIncludeSystem --suppress=missingInclude components/

  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check formatting
        run: find components -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

  esphome-compile:
    name: ESPHome ${{ matrix.esphome_version || 'latest' }} / ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        esphome_version: ["2025.5.0", ""]
        platform:
          - {name: ESP8266, yaml: "tests/test_esp8266.yaml"}
          - {name: ESP32, yaml: "tests/test_esp32.yaml"}
          - {name: BK7231N, yaml: "tests/test_bk7231n.yaml"}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ESPHome
        run: pip install esphome${{ matrix.esphome_version && format('=={0}', matrix.esphome_version) || '' }}
      - name: Compile
        run: esphome compile ${{ matrix.platform.yaml }}
