esphome:
  name: test-nec-fan-light-esp32

esp32:
  board: esp32dev

external_components:
  - source:
      type: local
      path: components

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: "test"
  password: "test1234"

remote_transmitter:
  pin: GPIO4
  carrier_duty_percent: 50%

nec_fan_light:
  id: ceiling_fan

fan:
  - platform: nec_fan_light
    name: "Test Fan"
    nec_fan_light_id: ceiling_fan

light:
  - platform: nec_fan_light
    name: "Test Light"
    nec_fan_light_id: ceiling_fan

button:
  - platform: nec_fan_light
    nec_fan_light_id: ceiling_fan
    brightness_up:
      name: "Brightness +"
    brightness_down:
      name: "Brightness -"
